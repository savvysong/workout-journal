<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>💪 운동 일지</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #c8f135;
    --accent2: #f1a735;
    --accent3: #35c8f1;
    --danger: #f15535;
    --purple: #b535f1;
    --text: #e8e8f0;
    --text-muted: #6a6a7a;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    touch-action: pan-y;
  }

  /* ── LAYOUT ── */
  .app {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bot);
  }

  /* ── HEADER ── */
  .header {
    flex-shrink: 0;
    padding: 14px 20px 10px;
    background: var(--bg);
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .header-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px; letter-spacing: -1px; color: var(--accent); line-height: 1;
  }
  .header-sub { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }

  /* ── SCROLL CONTENT ── */
  .scroll-content {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 16px 16px 80px;
    -webkit-overflow-scrolling: touch;
  }
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    flex-shrink: 0;
    display: flex;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding-bottom: var(--safe-bot);
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 10px 4px; gap: 4px;
    cursor: pointer; transition: all 0.15s;
    border: none; background: transparent;
    color: var(--text-muted);
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 20px; line-height: 1; }
  .nav-label { font-size: 10px; font-family: 'Black Han Sans', sans-serif; letter-spacing: 0.5px; }

  /* ── DATE BAR ── */
  .date-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 14px;
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .date-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; }
  .date-input {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 13px; padding: 7px 10px; border-radius: 8px; outline: none;
    -webkit-appearance: none; flex: 1; min-width: 130px;
  }
  .date-input:focus { border-color: var(--accent); }
  .today-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-muted);
    font-size: 11px; padding: 7px 12px; border-radius: 8px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; white-space: nowrap;
  }
  .date-display {
    width: 100%; font-family: 'Black Han Sans', sans-serif;
    font-size: 13px; color: var(--accent); padding-top: 2px;
  }

  /* ── EXERCISE GRID ── */
  .input-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 10px; margin-bottom: 16px;
  }
  .exercise-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 12px;
    display: flex; flex-direction: column; gap: 10px;
    position: relative; overflow: hidden;
    transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .exercise-card:active { transform: scale(0.97); }
  .exercise-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; border-radius: 14px 14px 0 0;
  }
  .exercise-card.running::before  { background: var(--accent); }
  .exercise-card.pullup::before   { background: var(--accent2); }
  .exercise-card.pushup::before   { background: var(--accent3); }
  .exercise-card.situp::before    { background: var(--danger); }
  .exercise-card.squat::before    { background: var(--purple); }

  .card-icon { font-size: 18px; line-height: 1; }
  .card-name { font-family: 'Black Han Sans', sans-serif; font-size: 13px; }
  .card-unit { font-size: 9px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

  .card-input-wrap {
    display: flex; align-items: center;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  .exercise-card.running .card-input-wrap:focus-within  { border-color: var(--accent); }
  .exercise-card.pullup  .card-input-wrap:focus-within  { border-color: var(--accent2); }
  .exercise-card.pushup  .card-input-wrap:focus-within  { border-color: var(--accent3); }
  .exercise-card.situp   .card-input-wrap:focus-within  { border-color: var(--danger); }
  .exercise-card.squat   .card-input-wrap:focus-within  { border-color: var(--purple); }

  .card-num-input {
    background: transparent; border: none; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700;
    padding: 9px 6px; width: 100%; outline: none; text-align: center;
    -webkit-appearance: none;
  }
  .card-num-input::placeholder { color: var(--border); font-size: 16px; }
  .unit-badge { padding: 0 8px 0 2px; font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; white-space: nowrap; }

  /* squat spans full width */
  .exercise-card.squat { grid-column: span 2; flex-direction: row; align-items: center; gap: 14px; padding: 12px 16px; }
  .exercise-card.squat .card-input-wrap { flex: 1; }
  .squat-info { display: flex; flex-direction: column; gap: 2px; }

  /* ── MEMO ── */
  .memo-section { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 16px; }
  .memo-label { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; margin-bottom: 8px; }
  .memo-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 14px;
    padding: 10px 12px; border-radius: 8px; outline: none; resize: none; line-height: 1.6;
  }
  .memo-input:focus { border-color: var(--accent); }
  .memo-input::placeholder { color: var(--text-muted); }

  /* ── SAVE ── */
  .save-btn {
    width: 100%; background: var(--accent); border: none; color: #0a0a0f;
    font-family: 'Black Han Sans', sans-serif; font-size: 17px; padding: 16px;
    border-radius: 12px; cursor: pointer; letter-spacing: 1px;
    transition: all 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .save-btn:active { transform: scale(0.98); background: #b8e025; }

  /* ── SECTION TITLE ── */
  .section-title {
    font-family: 'Black Han Sans', sans-serif; font-size: 14px;
    color: var(--text-muted); letter-spacing: 1px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── CALENDAR ── */
  .cal-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .cal-nav-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 20px; width: 40px; height: 40px;
    border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .cal-nav-btn:active { border-color: var(--accent); color: var(--accent); }
  .cal-month { font-family: 'Black Han Sans', sans-serif; font-size: 18px; }
  .cal-month span { color: var(--accent); }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-day-header {
    text-align: center; font-size: 9px; font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted); padding: 5px 0; font-weight: 700; letter-spacing: 0.5px;
  }
  .cal-day-header.sun { color: #f15535; }
  .cal-day-header.sat { color: var(--accent3); }

  .cal-cell {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; min-height: 62px; padding: 5px 4px;
    display: flex; flex-direction: column; gap: 2px;
    transition: all 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .cal-cell.empty { background: transparent; border-color: transparent; }
  .cal-cell.today { border-color: var(--accent); }
  .cal-cell.has-log { cursor: pointer; }
  .cal-cell.has-log:active { transform: scale(0.95); }
  .cal-cell.selected { border-color: var(--accent); background: rgba(200,241,53,0.07); }

  .cal-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; color: var(--text-muted); }
  .cal-cell.today .cal-num { color: var(--accent); }
  .cal-cell.sun .cal-num { color: #f15535; }
  .cal-cell.sat .cal-num { color: var(--accent3); }

  .cal-dots { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 1px; }
  .cal-dot { width: 5px; height: 5px; border-radius: 50%; }
  .cal-summary { display: flex; flex-direction: column; gap: 1px; margin-top: 2px; }
  .cal-summary-item { font-size: 8px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }

  .cal-detail {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; margin-top: 14px;
    animation: slideIn 0.2s ease;
  }
  .cal-detail-date { font-family: 'Black Han Sans', sans-serif; font-size: 14px; color: var(--accent); margin-bottom: 12px; }
  .cal-detail-stats { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 8px; }
  .cal-detail-stat { display: flex; align-items: center; gap: 5px; background: var(--surface2); border-radius: 8px; padding: 8px 10px; }
  .cal-detail-icon { font-size: 13px; }
  .cal-detail-val { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; }
  .cal-detail-unit { font-size: 10px; color: var(--text-muted); }
  .cal-detail-memo { font-size: 12px; color: var(--text-muted); font-style: italic; border-top: 1px solid var(--border); padding-top: 8px; line-height: 1.5; margin-top: 4px; }

  /* ── LOG LIST ── */
  .log-list { display: flex; flex-direction: column; gap: 10px; }
  .log-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px;
    display: flex; flex-direction: column; gap: 10px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .log-header { display: flex; align-items: center; justify-content: space-between; }
  .log-date { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; color: var(--accent); }
  .log-delete {
    background: transparent; border: 1px solid var(--border); color: var(--text-muted);
    font-size: 11px; padding: 4px 10px; border-radius: 6px; cursor: pointer;
  }
  .log-delete:active { border-color: var(--danger); color: var(--danger); }
  .log-stats { display: flex; gap: 7px; flex-wrap: wrap; }
  .log-stat { display: flex; align-items: center; gap: 5px; background: var(--surface2); border-radius: 7px; padding: 5px 9px; }
  .log-stat-icon { font-size: 11px; }
  .log-stat-val { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; }
  .log-stat-unit { font-size: 9px; color: var(--text-muted); }
  .log-memo { font-size: 12px; color: var(--text-muted); font-style: italic; border-top: 1px solid var(--border); padding-top: 8px; line-height: 1.5; }
  .empty-log { text-align: center; color: var(--text-muted); font-size: 13px; padding: 30px; border: 1px dashed var(--border); border-radius: 12px; line-height: 1.8; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: calc(60px + var(--safe-bot) + 16px); left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent); color: #0a0a0f;
    font-family: 'Black Han Sans', sans-serif; font-size: 14px;
    padding: 11px 22px; border-radius: 999px;
    box-shadow: 0 6px 24px rgba(200,241,53,0.3);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div>
      <div class="header-title">💪 운동 일지</div>
      <div class="header-sub">WORKOUT JOURNAL</div>
    </div>
    <div id="headerDate" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);text-align:right;line-height:1.5;"></div>
  </div>

  <!-- SCROLL CONTENT -->
  <div class="scroll-content" id="scrollContent">

    <!-- INPUT PANEL -->
    <div class="panel active" id="panel-input">
      <div class="date-bar">
        <span class="date-label">날짜</span>
        <input type="date" class="date-input" id="dateInput">
        <button class="today-btn" onclick="setToday()">오늘</button>
        <div class="date-display" id="dateDisplay"></div>
      </div>

      <div class="input-grid">
        <div class="exercise-card running">
          <div><div class="card-icon">🏃</div><div class="card-name">러닝</div><div class="card-unit">RUNNING</div></div>
          <div class="card-input-wrap"><input type="number" class="card-num-input" id="running" placeholder="0" min="0" step="0.1" inputmode="decimal"><span class="unit-badge">km</span></div>
        </div>
        <div class="exercise-card pullup">
          <div><div class="card-icon">🦾</div><div class="card-name">풀업</div><div class="card-unit">PULL-UP</div></div>
          <div class="card-input-wrap"><input type="number" class="card-num-input" id="pullup" placeholder="0" min="0" inputmode="numeric"><span class="unit-badge">회</span></div>
        </div>
        <div class="exercise-card pushup">
          <div><div class="card-icon">🔥</div><div class="card-name">푸시업</div><div class="card-unit">PUSH-UP</div></div>
          <div class="card-input-wrap"><input type="number" class="card-num-input" id="pushup" placeholder="0" min="0" inputmode="numeric"><span class="unit-badge">회</span></div>
        </div>
        <div class="exercise-card situp">
          <div><div class="card-icon">⚡</div><div class="card-name">싯업</div><div class="card-unit">SIT-UP</div></div>
          <div class="card-input-wrap"><input type="number" class="card-num-input" id="situp" placeholder="0" min="0" inputmode="numeric"><span class="unit-badge">회</span></div>
        </div>
        <div class="exercise-card squat">
          <div class="squat-info"><div class="card-icon">🏋️</div><div class="card-name">스쿼트</div><div class="card-unit">SQUAT</div></div>
          <div class="card-input-wrap"><input type="number" class="card-num-input" id="squat" placeholder="0" min="0" inputmode="numeric"><span class="unit-badge">회</span></div>
        </div>
      </div>

      <div class="memo-section">
        <div class="memo-label">📝 메모 (선택)</div>
        <textarea class="memo-input" id="memo" rows="2" placeholder="오늘의 컨디션, 특이사항..."></textarea>
      </div>

      <button class="save-btn" onclick="saveLog()">💾 저장하기</button>
    </div>

    <!-- CALENDAR PANEL -->
    <div class="panel" id="panel-calendar">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
        <div class="cal-month" id="calMonthLabel"></div>
        <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div id="calDetail"></div>
    </div>

    <!-- HISTORY PANEL -->
    <div class="panel" id="panel-history">
      <div class="section-title">전체 기록</div>
      <div class="log-list" id="logList"></div>
    </div>

  </div><!-- /scroll-content -->

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-input" onclick="switchTab('input')">
      <span class="nav-icon">📝</span><span class="nav-label">기록</span>
    </button>
    <button class="nav-btn" id="nav-calendar" onclick="switchTab('calendar')">
      <span class="nav-icon">📅</span><span class="nav-label">캘린더</span>
    </button>
    <button class="nav-btn" id="nav-history" onclick="switchTab('history')">
      <span class="nav-icon">📋</span><span class="nav-label">전체기록</span>
    </button>
  </div>

</div><!-- /app -->

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'workout_journal_v2';
  const EXERCISES = [
    { id: 'running', label: '러닝',  icon: '🏃', unit: 'km', color: '#c8f135', step: 0.1 },
    { id: 'pullup',  label: '풀업',  icon: '🦾', unit: '회', color: '#f1a735' },
    { id: 'pushup',  label: '푸시업', icon: '🔥', unit: '회', color: '#35c8f1' },
    { id: 'situp',   label: '싯업',  icon: '⚡', unit: '회', color: '#f15535' },
    { id: 'squat',   label: '스쿼트', icon: '🏋️', unit: '회', color: '#b535f1' },
  ];

  let calYear, calMonth, selectedCalDate = null;

  function getTodayStr() { return new Date().toISOString().split('T')[0]; }
  function formatDateKr(ds) {
    const [y,m,d] = ds.split('-');
    const wd = ['일','월','화','수','목','금','토'][new Date(ds).getDay()];
    return `${y}년 ${+m}월 ${+d}일 (${wd})`;
  }
  function loadLogs() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } }
  function saveLogs(l) { localStorage.setItem(STORAGE_KEY, JSON.stringify(l)); }
  function getLogByDate(d) { return loadLogs().find(l => l.date === d); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function updateHeaderDate() {
    const now = new Date();
    const wd = ['일','월','화','수','목','금','토'][now.getDay()];
    const m = now.getMonth()+1, d = now.getDate();
    document.getElementById('headerDate').textContent = `${m}월 ${d}일\n${wd}요일`;
  }

  function switchTab(name) {
    ['input','calendar','history'].forEach(n => {
      document.getElementById('panel-'+n).classList.toggle('active', n===name);
      document.getElementById('nav-'+n).classList.toggle('active', n===name);
    });
    document.getElementById('scrollContent').scrollTop = 0;
    if (name==='calendar') renderCalendar();
    if (name==='history') renderLogs();
  }

  function setToday() {
    document.getElementById('dateInput').value = getTodayStr();
    updateDateDisplay(); prefillFromDate(getTodayStr());
  }
  function updateDateDisplay() {
    const v = document.getElementById('dateInput').value;
    document.getElementById('dateDisplay').textContent = v ? formatDateKr(v) : '';
  }
  function prefillFromDate(date) {
    const log = getLogByDate(date);
    EXERCISES.forEach(e => { document.getElementById(e.id).value = log ? (log[e.id] || '') : ''; });
    document.getElementById('memo').value = log ? (log.memo || '') : '';
  }
  document.getElementById('dateInput').addEventListener('change', function() {
    updateDateDisplay(); prefillFromDate(this.value);
  });

  function saveLog() {
    const date = document.getElementById('dateInput').value;
    if (!date) { showToast('날짜를 선택해주세요!'); return; }
    const vals = {}; let any = false;
    EXERCISES.forEach(e => {
      const raw = document.getElementById(e.id).value;
      vals[e.id] = e.id==='running' ? (parseFloat(raw)||0) : (parseInt(raw)||0);
      if (vals[e.id] > 0) any = true;
    });
    if (!any) { showToast('최소 하나는 입력해주세요 💪'); return; }
    const memo = document.getElementById('memo').value.trim();
    const logs = loadLogs();
    const idx = logs.findIndex(l => l.date===date);
    const entry = { date, ...vals, memo, savedAt: new Date().toISOString() };
    if (idx>=0) { logs[idx]=entry; showToast('✅ 업데이트 완료!'); }
    else { logs.unshift(entry); showToast('✅ 저장 완료!'); }
    saveLogs(logs);
  }

  function deleteLog(date) {
    saveLogs(loadLogs().filter(l => l.date!==date));
    renderLogs(); showToast('🗑️ 삭제됨');
    if (selectedCalDate===date) { selectedCalDate=null; document.getElementById('calDetail').innerHTML=''; }
  }

  function renderLogs() {
    const logs = loadLogs().sort((a,b) => b.date.localeCompare(a.date));
    const list = document.getElementById('logList');
    if (!logs.length) { list.innerHTML='<div class="empty-log">아직 기록이 없어요<br>운동을 기록해보세요 💪</div>'; return; }
    list.innerHTML = logs.map(log => `
      <div class="log-item">
        <div class="log-header">
          <span class="log-date">${formatDateKr(log.date)}</span>
          <button class="log-delete" onclick="deleteLog('${log.date}')">삭제</button>
        </div>
        <div class="log-stats">
          ${EXERCISES.filter(e=>log[e.id]>0).map(e=>`<div class="log-stat"><span class="log-stat-icon">${e.icon}</span><span class="log-stat-val" style="color:${e.color}">${log[e.id]}</span><span class="log-stat-unit">${e.unit}</span></div>`).join('')}
        </div>
        ${log.memo?`<div class="log-memo">${log.memo}</div>`:''}
      </div>`).join('');
  }

  function initCalMonth() { const n=new Date(); calYear=n.getFullYear(); calMonth=n.getMonth(); }
  function changeMonth(dir) {
    calMonth+=dir;
    if(calMonth<0){calMonth=11;calYear--;} if(calMonth>11){calMonth=0;calYear++;}
    selectedCalDate=null; document.getElementById('calDetail').innerHTML=''; renderCalendar();
  }

  function renderCalendar() {
    const logs=loadLogs(); const logMap={};
    logs.forEach(l=>{logMap[l.date]=l;});
    const mnames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    document.getElementById('calMonthLabel').innerHTML=`<span>${calYear}</span>년 ${mnames[calMonth]}`;
    const grid=document.getElementById('calGrid');
    const days=['SUN','MON','TUE','WED','THU','FRI','SAT'];
    const dcls=['sun','','','','','','sat'];
    let html=days.map((d,i)=>`<div class="cal-day-header ${dcls[i]}">${d}</div>`).join('');
    const firstDay=new Date(calYear,calMonth,1).getDay();
    const dim=new Date(calYear,calMonth+1,0).getDate();
    const todayStr=getTodayStr();
    for(let i=0;i<firstDay;i++) html+='<div class="cal-cell empty"></div>';
    for(let d=1;d<=dim;d++){
      const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const log=logMap[ds]; const dow=new Date(ds).getDay();
      const cls=['cal-cell', dow===0?'sun':dow===6?'sat':'', ds===todayStr?'today':'', log?'has-log':'', ds===selectedCalDate?'selected':''].filter(Boolean).join(' ');
      let inner=`<div class="cal-num">${d}</div>`;
      if(log){
        const active=EXERCISES.filter(e=>log[e.id]>0);
        inner+=`<div class="cal-dots">${active.map(e=>`<div class="cal-dot" style="background:${e.color}"></div>`).join('')}</div>`;
        inner+=`<div class="cal-summary">${active.slice(0,2).map(e=>`<div class="cal-summary-item">${e.icon}${log[e.id]}${e.unit}</div>`).join('')}</div>`;
      }
      const click=log?`onclick="showCalDetail('${ds}')"` :'';
      html+=`<div class="${cls}" ${click}>${inner}</div>`;
    }
    grid.innerHTML=html;
  }

  function showCalDetail(ds) {
    selectedCalDate=ds; renderCalendar();
    const log=getLogByDate(ds); if(!log) return;
    const stats=EXERCISES.filter(e=>log[e.id]>0).map(e=>`<div class="cal-detail-stat"><span class="cal-detail-icon">${e.icon}</span><span class="cal-detail-val" style="color:${e.color}">${log[e.id]}</span><span class="cal-detail-unit">${e.unit}</span></div>`).join('');
    document.getElementById('calDetail').innerHTML=`<div class="cal-detail"><div class="cal-detail-date">${formatDateKr(ds)}</div><div class="cal-detail-stats">${stats}</div>${log.memo?`<div class="cal-detail-memo">${log.memo}</div>`:''}</div>`;
  }

  // INIT
  updateHeaderDate();
  initCalMonth();
  setToday();
</script>
</body>
</html>
